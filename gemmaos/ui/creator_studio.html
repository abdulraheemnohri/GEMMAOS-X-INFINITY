<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemmaOS - Creator studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="bridge.js"></script>
</head>
<body>

    <div class="nav-panel">
        <a href="ai_home.html" class="nav-item">HOME</a>
        <a href="dashboard.html" class="nav-item">DASH</a>
        <a href="mission_control.html" class="nav-item">MISS</a>
        <a href="studios.html" class="nav-item">STDO</a>
        <a href="centers.html" class="nav-item">CNTR</a>
        <a href="settings.html" class="nav-item">SET</a>
    </div>

    <div class="view-container">
<div class="header">
        <div class="logo">CREATOR STUDIO</div>
<div class="main-content">
        <div class="creator-tool">
            <div class="section-title">Generative Intent</div>
            <textarea class="glass-panel prompt-input" placeholder="Describe the media you want to create..."></textarea>
            <div class="gen-options">
                <div class="glass-panel gen-option" style="background: var(--primary-blue)">IMAGE</div>
                <div class="glass-panel gen-option">VIDEO</div>
                <div class="glass-panel gen-option">AUDIO</div>
            </div>
            <button class="glass-panel" style="width: 100%; padding: 16px; font-weight: bold; background: linear-gradient(to right, var(--primary-blue), var(--secondary-purple)); color: white; border: none;">GENERATE</button>
        </div>

        <div class="section">
            <div class="section-title">Project Gallery</div>
            <div class="gallery-grid">
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">AI Editing Tools</div>
            <div class="recent-activities">
                <div class="glass-panel activity-item">
                    <div style="flex: 1">
                        <strong>Neural Style Transfer</strong>
                        <small>Apply artistic filters to local images</small>
                    </div>
                </div>
                <div class="glass-panel activity-item">
                    <div style="flex: 1">
                        <strong>Voice Cloning (1m sample)</strong>
                        <small>Generate audio using your own voice</small>
                    </div>
                </div>
            </div>
        </div>

        </div>
    </div>

    <div class="gemma-orb-container">
        <div class="gemma-orb"></div>
        <small style="opacity: 0.6">LISTENING</small>
    </div>


    <div id="system-console" class="glass-panel" style="position: fixed; bottom: 20px; left: 100px; right: 100px; height: 150px; padding: 15px; font-family: monospace; font-size: 0.7rem; overflow-y: auto; display: none; z-index: 2000;">
        <div style="color: var(--primary-blue); margin-bottom: 5px;">[GEMMAOS KERNEL LOG]</div>
        <div id="console-output"></div>
    </div>

</body>
</html>
