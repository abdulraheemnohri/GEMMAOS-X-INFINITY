<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemmaOS Agent Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="logo">AGENT HUB</div>
        <div class="status-bar">
            <span>6 Agents Active</span>
        </div>
    </div>

    <div class="main-content">
        <div class="section-title">Orchestration & Permissions</div>

        <div class="recent-activities">
            <div class="glass-panel activity-item">
                <div class="activity-icon" style="background: var(--primary-blue)"></div>
                <div style="flex: 1">
                    <strong>Coding Agent</strong>
                    <small>High Autonomy | Write Access</small>
                </div>
                <div class="status-bar">ACTIVE</div>
            </div>

            <div class="glass-panel activity-item">
                <div class="activity-icon" style="background: var(--secondary-purple)"></div>
                <div style="flex: 1">
                    <strong>Media Agent</strong>
                    <small>Medium Autonomy | Generate/Edit</small>
                </div>
                <div class="status-bar">IDLE</div>
            </div>

            <div class="glass-panel activity-item">
                <div class="activity-icon" style="background: #ff4757"></div>
                <div style="flex: 1">
                    <strong>Security Agent</strong>
                    <small>Critical Priority | Monitoring</small>
                </div>
                <div class="status-bar">SCANNING</div>
            </div>

            <div class="glass-panel activity-item">
                <div class="activity-icon" style="background: #2ed573"></div>
                <div style="flex: 1">
                    <strong>Communication Agent</strong>
                    <small>Low Autonomy | Drafts only</small>
                </div>
                <div class="status-bar">ACTIVE</div>
            </div>
        </div>
    </div>
</body>
</html>
