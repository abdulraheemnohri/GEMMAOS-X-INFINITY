<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemmaOS - Memory vault</title>
    <link rel="stylesheet" href="style.css">
    <script src="bridge.js"></script>
</head>
<body>

    <div class="nav-panel">
        <a href="ai_home.html" class="nav-item">HOME</a>
        <a href="dashboard.html" class="nav-item">DASH</a>
        <a href="mission_control.html" class="nav-item">MISS</a>
        <a href="studios.html" class="nav-item">STDO</a>
        <a href="centers.html" class="nav-item">CNTR</a>
        <a href="settings.html" class="nav-item">SET</a>
    </div>

    <div class="view-container">
<div class="header">
        <div class="logo">MEMORY VAULT</div>
<div class="main-content">
        <div class="intent-bar-container">
            <input type="text" class="glass-panel intent-bar" placeholder="Query your semantic memory...">
        </div>

        <div class="section">
            <div class="section-title">Knowledge Graph: "GemmaOS Project"</div>
            <div class="glass-panel" style="height: 200px; display: flex; justify-content: center; align-items: center; opacity: 0.8">
                [ Interactive Knowledge Graph Visualization ]
            </div>
        </div>

        <div class="section">
            <div class="section-title">Recent Ingestions</div>
            <div class="recent-activities">
                <div class="glass-panel activity-item">
                    <div style="flex: 1">
                        <strong>Architecture_V1_Final.pdf</strong>
                        <small>Document | Key Findings Extracted</small>
                    </div>
                </div>
                <div class="glass-panel activity-item">
                    <div style="flex: 1">
                        <strong>nightly_consolidation_logs</strong>
                        <small>Session Summary | Tier 2 -> 3</small>
                    </div>
                </div>
            </div>
        </div>

        </div>
    </div>

    <div class="gemma-orb-container">
        <div class="gemma-orb"></div>
        <small style="opacity: 0.6">LISTENING</small>
    </div>


    <div id="system-console" class="glass-panel" style="position: fixed; bottom: 20px; left: 100px; right: 100px; height: 150px; padding: 15px; font-family: monospace; font-size: 0.7rem; overflow-y: auto; display: none; z-index: 2000;">
        <div style="color: var(--primary-blue); margin-bottom: 5px;">[GEMMAOS KERNEL LOG]</div>
        <div id="console-output"></div>
    </div>

</body>
</html>
