<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemmaOS - Research studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="nav-panel">
        <a href="ai_home.html" class="nav-item">HOME</a>
        <a href="dashboard.html" class="nav-item">DASH</a>
        <a href="mission_control.html" class="nav-item">MISS</a>
        <a href="studios.html" class="nav-item">STDO</a>
        <a href="centers.html" class="nav-item">CNTR</a>
        <a href="settings.html" class="nav-item">SET</a>
    </div>

    <div class="view-container">
<div class="header">
        <div class="logo">RESEARCH STUDIO</div>
<div class="main-content">
        <div class="intent-bar-container">
            <input type="text" class="glass-panel intent-bar" placeholder="Enter topic for deep synthesis...">
        </div>

        <div class="section">
            <div class="section-title">Active Synthesis</div>
            <div class="glass-panel activity-item" style="border-left: 4px solid var(--primary-blue)">
                <div style="flex: 1">
                    <strong>Topic: AI-Native Kernel Design</strong>
                    <small>Analyzing 14 local documents... 85% Complete</small>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Saved Reports</div>
            <div class="recent-activities">
                <div class="glass-panel activity-item">
                    <div style="flex: 1">
                        <strong>Transformer_Efficiency_v2.pdf</strong>
                        <small>Generated 2h ago | PDF | 5 Citations</small>
                    </div>
                </div>
                <div class="glass-panel activity-item">
                    <div style="flex: 1">
                        <strong>Edge_LLM_Benchmarks.md</strong>
                        <small>Generated yesterday | Markdown</small>
                    </div>
                </div>
            </div>
        </div>

        </div>
    </div>

    <div class="gemma-orb-container">
        <div class="gemma-orb"></div>
        <small style="opacity: 0.6">LISTENING</small>
    </div>

</body>
</html>
