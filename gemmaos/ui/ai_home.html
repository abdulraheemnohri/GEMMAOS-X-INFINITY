<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemmaOS X Infinity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-panel glass-panel">
        <div class="nav-icon"></div>
        <div class="nav-icon"></div>
        <div class="nav-icon"></div>
    </div>

    <div class="header">
        <div class="logo">GEMMAOS X INFINITY</div>
        <div class="status-bar">
            <span>NPU 18%</span>
            <span>MEM 4.2GB</span>
            <span>BATT 92%</span>
        </div>
    </div>

    <div class="main-content">
        <div class="intent-bar-container">
            <input type="text" class="glass-panel intent-bar" placeholder="Define your next evolution...">
        </div>

        <div class="section">
            <div class="section-title">Proactive Suggestions</div>
            <div class="widget-grid">
                <div class="glass-panel widget">
                    <strong>Deep Work Mode</strong>
                    <small>Based on current focus</small>
                </div>
                <div class="glass-panel widget">
                    <strong>Review Workflow</strong>
                    <small>Discovered pattern</small>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Active Agents</div>
            <div class="recent-activities">
                <div class="glass-panel activity-item">
                    <div class="activity-icon"></div>
                    <div>
                        <strong>Security Agent</strong>
                        <small>Network monitoring active</small>
                    </div>
                </div>
                <div class="glass-panel activity-item">
                    <div class="activity-icon"></div>
                    <div>
                        <strong>Memory Tier 3</strong>
                        <small>Consolidating nightly sessions</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="gemma-orb-container">
        <div class="gemma-orb"></div>
        <small style="letter-spacing: 2px; opacity: 0.8; font-size: 0.7rem;">LISTENING</small>
    </div>
</body>
</html>
